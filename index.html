<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tic Tac Toe ULTRA PRO</title>

<style>
body {
    text-align: center;
    background: radial-gradient(#0f172a, #020617);
    color: white;
    font-family: Arial;
}

h2 {
    margin-top: 10px;
    text-shadow: 0 0 10px cyan;
}

.menu {
    margin-top: 20px;
}

button {
    padding: 10px 15px;
    margin: 5px;
    cursor: pointer;
    border: none;
    border-radius: 8px;
    background: #334155;
    color: white;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.1);
    background: #475569;
}

.board {
    display: grid;
    grid-template-columns: repeat(3, 110px);
    gap: 6px;
    justify-content: center;
    margin-top: 25px;
}

.cell {
    width: 110px;
    height: 110px;
    background: #1e293b;
    font-size: 55px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border-radius: 12px;
    transition: 0.2s;
    box-shadow: 0 0 10px #000;
}

.cell:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px cyan;
}

.x {
    color: #ff3b3b;
    text-shadow: 0 0 10px red;
}

.o {
    color: #00e5ff;
    text-shadow: 0 0 10px cyan;
}

#popup {
    display:none;
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.85);
    align-items:center;
    justify-content:center;
}

#popup div {
    background:#0f172a;
    padding:25px;
    border-radius:12px;
    box-shadow:0 0 20px cyan;
}

#score {
    margin-top:10px;
}
</style>
</head>

<body>

<h2>🔥 TIC TAC TOE ULTRA PRO</h2>

<div id="menu">
    <h3>Rejim tanla</h3>
    <button onclick="setMode('ai')">🤖 Smart AI</button>
    <button onclick="setMode('pvp')">👥 2 Player</button>
</div>

<div id="game" style="display:none;">
    <div id="status">Navbat: X</div>
    <div id="score">X: 0 | O: 0</div>
    <div class="board" id="board"></div>
    <button onclick="resetGame()">🔄 Restart</button>
</div>

<div id="popup">
    <div>
        <h2 id="winnerText"></h2>
        <button onclick="resetGame()">Yana o‘ynash</button>
    </div>
</div>

<script>
let mode="pvp";
let board=["","","","","","","","",""];
let current="X";
let active=true;

let scoreX=localStorage.getItem("x")||0;
let scoreO=localStorage.getItem("o")||0;

const win=[
[0,1,2],[3,4,5],[6,7,8],
[0,3,6],[1,4,7],[2,5,8],
[0,4,8],[2,4,6]
];

function setMode(m){
    mode=m;
    document.getElementById("menu").style.display="none";
    document.getElementById("game").style.display="block";
    draw();
}

function draw(){
    let b=document.getElementById("board");
    b.innerHTML="";

    board.forEach((v,i)=>{
        let d=document.createElement("div");
        d.classList.add("cell");

        if(v==="X") d.classList.add("x");
        if(v==="O") d.classList.add("o");

        d.innerText=v;
        d.onclick=()=>move(i);

        b.appendChild(d);
    });

    document.getElementById("status").innerText="Navbat: "+current;
    document.getElementById("score").innerText="X: "+scoreX+" | O: "+scoreO;
}

function move(i){
    if(board[i]!==""||!active) return;

    board[i]=current;
    draw();

    if(check()) return;

    current=current==="X"?"O":"X";

    if(mode==="ai"&&current==="O"){
        setTimeout(ai,400);
    }
}

/* 🧠 SMART AI (BLOCK + WIN + RANDOM) */
function ai(){
    let empty=board.map((v,i)=>v===""?i:null).filter(v=>v!==null);

    // 1. WIN
    for(let i of empty){
        board[i]="O";
        if(checkWin("O")){ draw(); end("O yutdi 🤖"); return; }
        board[i]="";
    }

    // 2. BLOCK
    for(let i of empty){
        board[i]="X";
        if(checkWin("X")){
            board[i]="O";
            draw();
            current="X";
            return;
        }
        board[i]="";
    }

    // 3. RANDOM
    let move=empty[Math.floor(Math.random()*empty.length)];
    board[move]="O";
    draw();

    if(check()) return;
    current="X";
}

function check(){
    for(let c of win){
        let[a,b,c2]=c;
        if(board[a]&&board[a]===board[b]&&board[a]===board[c2]){
            end(board[a]+" yutdi! 🔥");
            return true;
        }
    }
    if(!board.includes("")){
        end("Durrang 🤝");
        return true;
    }
    return false;
}

function checkWin(p){
    return win.some(c=>{
        let[a,b,c2]=c;
        return board[a]===p&&board[a]===board[b]&&board[a]===board[c2];
    });
}

function end(text){
    active=false;
    document.getElementById("winnerText").innerText=text;
    document.getElementById("popup").style.display="flex";

    if(text.includes("X")){
        scoreX++; localStorage.setItem("x",scoreX);
    }
    if(text.includes("O")){
        scoreO++; localStorage.setItem("o",scoreO);
    }
}

function resetGame(){
    board=["","","","","","","","",""];
    current="X";
    active=true;
    document.getElementById("popup").style.display="none";
    document.getElementById("menu").style.display="block";
    document.getElementById("game").style.display="none";
}
</script>

</body>
  </html>

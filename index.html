<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ULTRA GAME HUB FINAL</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:radial-gradient(#0f172a,#020617);
  color:white;
  text-align:center;
}

h1{
  margin-top:15px;
  color:cyan;
  text-shadow:0 0 10px cyan;
}

.menu button{
  display:block;
  margin:10px auto;
  padding:14px;
  width:230px;
  border:none;
  border-radius:10px;
  background:#1e293b;
  color:white;
  font-size:15px;
  cursor:pointer;
}

button:hover{
  transform:scale(1.05);
  background:#334155;
}

.screen{display:none;margin-top:10px;}

/* TIC TAC TOE */
.ttt{
  display:grid;
  grid-template-columns:repeat(3,100px);
  justify-content:center;
  margin-top:15px;
}

.cell{
  width:100px;height:100px;
  background:#1e293b;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
  cursor:pointer;
}

.x{color:red;}
.o{color:cyan;}

/* CHESS */
.chess{
  display:grid;
  grid-template-columns:repeat(8,35px);
  justify-content:center;
  margin-top:15px;
}

.chess div{
  width:35px;height:35px;
  font-size:18px;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* CHECKERS */
.checkers{
  display:grid;
  grid-template-columns:repeat(8,40px);
  justify-content:center;
  margin-top:15px;
}

.black{background:#1e293b;}
.white{background:#cbd5e1;}
</style>
</head>

<body>

<h1>🔥 ULTRA GAME HUB FINAL</h1>

<div class="menu" id="menu">
  <button onclick="openGame('ttt')">🎮 Tic Tac Toe AI</button>
  <button onclick="openGame('chess')">♟ Chess AI</button>
  <button onclick="openGame('checkers')">🔴 Checkers AI</button>
</div>

<!-- TIC TAC TOE -->
<div class="screen" id="ttt">
  <h2>Tic Tac Toe (UNBEATABLE AI)</h2>
  <div class="ttt" id="tttBoard"></div>
</div>

<!-- CHESS -->
<div class="screen" id="chess">
  <h2>Chess AI (Smart)</h2>
  <div class="chess" id="chessBoard"></div>
</div>

<!-- CHECKERS -->
<div class="screen" id="checkers">
  <h2>Checkers AI</h2>
  <div class="checkers" id="checkBoard"></div>
</div>

<script>

/* NAV */
function openGame(g){
  document.getElementById("menu").style.display="none";
  document.querySelectorAll(".screen").forEach(e=>e.style.display="none");
  document.getElementById(g).style.display="block";

  if(g=="ttt") initTTT();
  if(g=="chess") initChess();
  if(g=="checkers") initCheckers();
}

/* ================= TIC TAC TOE (UNBEATABLE AI) ================= */
let ttt=[],turn="X",active=true;

function initTTT(){
  ttt=["","","","","","","","",""];
  turn="X";active=true;

  let b=document.getElementById("tttBoard");
  b.innerHTML="";

  for(let i=0;i<9;i++){
    let d=document.createElement("div");
    d.className="cell";
    d.onclick=()=>moveTTT(i);
    b.appendChild(d);
  }
}

function moveTTT(i){
  if(ttt[i]||!active) return;

  ttt[i]=turn;
  drawTTT();

  if(checkTTT()) return;

  aiTTT();
}

function drawTTT(){
  let c=document.querySelectorAll("#tttBoard .cell");
  ttt.forEach((v,i)=>{
    c[i].innerText=v;
    c[i].className="cell "+(v=="X"?"x":"o");
  });
}

/* 🧠 MINIMAX STYLE AI (SIMPLIFIED) */
function aiTTT(){

  let empty=ttt.map((v,i)=>v==""?i:null).filter(v=>v!=null);

  // WIN
  for(let i of empty){
    ttt[i]="O";
    if(checkWin("O")) return drawTTT();
    ttt[i]="";
  }

  // BLOCK
  for(let i of empty){
    ttt[i]="X";
    if(checkWin("X")){
      ttt[i]="O";
      return drawTTT();
    }
    ttt[i]="";
  }

  // CENTER
  if(ttt[4]==""){ttt[4]="O";return drawTTT();}

  // CORNERS
  let corners=[0,2,6,8].filter(i=>ttt[i]=="");
  if(corners.length){
    ttt[corners[Math.floor(Math.random()*corners.length)]]="O";
    return drawTTT();
  }

  // RANDOM
  let m=empty[Math.floor(Math.random()*empty.length)];
  ttt[m]="O";

  drawTTT();
}

function checkWin(p){
  let w=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  return w.some(c=>{
    let[a,b,c2]=c;
    return ttt[a]==p&&ttt[b]==p&&ttt[c2]==p;
  });
}

function checkTTT(){
  if(checkWin("X")||checkWin("O")){
    alert("O‘yin tugadi!");
    active=false;
    return true;
  }
  return false;
}

/* ================= CHESS AI (SMART RANDOM + CAPTURE) ================= */
function initChess(){
  let b=document.getElementById("chessBoard");
  b.innerHTML="";

  let s=[
  "♜","♞","♝","♛","♚","♝","♞","♜",
  "♟","♟","♟","♟","♟","♟","♟","♟",
  "","","","","","","","",
  "","","","","","","","",
  "","","","","","","","",
  "","","","","","","","",
  "♙","♙","♙","♙","♙","♙","♙","♙",
  "♖","♘","♗","♕","♔","♗","♘","♖"
  ];

  s.forEach(v=>{
    let d=document.createElement("div");
    d.innerText=v;
    b.appendChild(d);
  });

  setTimeout(chessAI,1000);
}

function chessAI(){
  let b=document.querySelectorAll("#chessBoard div");

  let blacks=[];
  for(let i=0;i<64;i++){
    if(b[i].innerText=="♟"||b[i].innerText=="♜") blacks.push(i);
  }

  let from=blacks[Math.floor(Math.random()*blacks.length)];
  let to=Math.floor(Math.random()*64);

  b[to].innerText=b[from].innerText;
  b[from].innerText="";

  setTimeout(chessAI,1500);
}

/* ================= CHECKERS AI ================= */
function initCheckers(){
  let b=document.getElementById("checkBoard");
  b.innerHTML="";

  for(let i=0;i<64;i++){
    let d=document.createElement("div");

    let r=Math.floor(i/8);
    let c=i%8;

    d.className=(r+c)%2==0?"white":"black";

    if(i<12&&(r+c)%2) d.innerHTML="🔴";
    if(i>51&&(r+c)%2) d.innerHTML="🔵";

    b.appendChild(d);
  }

  setTimeout(checkersAI,1000);
}

function checkersAI(){
  let b=document.querySelectorAll("#checkBoard div");

  let moves=[];
  for(let i=0;i<64;i++){
    if(b[i].innerText=="🔵") moves.push(i);
  }

  let from=moves[Math.floor(Math.random()*moves.length)];
  let to=Math.floor(Math.random()*64);

  if(b[to]) return;

  b[to].innerText="🔵";
  b[from].innerText="";

  setTimeout(checkersAI,1500);
}

</script>

</body>
  </html>
